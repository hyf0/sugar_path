name: Test

on:
  pull_request:
  push:
    # Feature-branch pushes already run via pull_request; only re-check main after merge.
    branches:
      - main
  workflow_dispatch:
    inputs:
      allocation_snapshot_mode:
        description: Check committed allocation snapshots or generate artifacts without committing them
        required: true
        default: check
        type: choice
        options:
          - check
          - generate

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Host-independent checks once; do not pay for them on every OS matrix cell.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --all-features --no-deps

  test:
    name: Test ${{ matrix.expected_host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            expected_host: x86_64-unknown-linux-gnu
            required_target_feature: ""
            expected_test: impl_sugar_path::relative_str_tests::production_dispatch_and_suffix_validation_match_short_path_oracle
          - os: windows-latest
            expected_host: x86_64-pc-windows-msvc
            required_target_feature: ""
            expected_test: windows_relative_with_has_fixed_context_results
          - os: macos-latest
            expected_host: aarch64-apple-darwin
            required_target_feature: neon
            expected_test: absolute_relative_paths_cross_neon_block_boundaries_exactly
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: clippy
      - name: Verify native Rust target
        env:
          EXPECTED_HOST: ${{ matrix.expected_host }}
          REQUIRED_TARGET_FEATURE: ${{ matrix.required_target_feature }}
        run: |
          actual_host="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ "$actual_host" != "$EXPECTED_HOST" ]]; then
            echo "expected Rust host $EXPECTED_HOST, found $actual_host"
            exit 1
          fi
          if [[ -n "$REQUIRED_TARGET_FEATURE" ]] \
            && ! rustc --print cfg | grep -Fqx "target_feature=\"$REQUIRED_TARGET_FEATURE\""; then
            echo "Rust host $EXPECTED_HOST is missing target feature $REQUIRED_TARGET_FEATURE"
            exit 1
          fi
      # Clippy stays on each OS: platform-gated imports only fail under that target.
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test default features
        run: cargo test --locked -p sugar_path
      - name: Test all features
        run: cargo test --locked --workspace --all-features
      - name: Verify platform-specific test registration
        env:
          EXPECTED_TEST: ${{ matrix.expected_test }}
        run: |
          cargo test --locked -p sugar_path --all-features -- --list > target/all-feature-tests.txt
          if ! grep -Fq "$EXPECTED_TEST: test" target/all-feature-tests.txt; then
            echo "expected platform-specific test was not registered: $EXPECTED_TEST"
            cat target/all-feature-tests.txt
            exit 1
          fi

  # Continuous gate: Linux + Windows only. The tracker always measures the
  # cached_current_dir production config via `cargo allocs`.
  allocations:
    name: Allocation snapshot ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            snapshot: x86_64-unknown-linux-gnu.snap
          - os: windows-latest
            snapshot: x86_64-pc-windows-msvc.snap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - name: Check committed allocation snapshot
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.allocation_snapshot_mode != 'generate' }}
        run: cargo allocs --check benchmarks/allocations/${{ matrix.snapshot }}
      - name: Generate allocation snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.allocation_snapshot_mode == 'generate' }}
        run: |
          mkdir -p benchmarks/allocations
          cargo allocs --write benchmarks/allocations/${{ matrix.snapshot }}
      - name: Upload generated allocation snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.allocation_snapshot_mode == 'generate' }}
        uses: actions/upload-artifact@v4
        with:
          name: allocation-snapshot-${{ matrix.snapshot }}
          path: benchmarks/allocations/${{ matrix.snapshot }}
          if-no-files-found: error
