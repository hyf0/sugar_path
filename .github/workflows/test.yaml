name: Test

on:
  pull_request:
  push:
    # Feature-branch pushes already run via pull_request; only re-check main after merge.
    branches:
      - main
  workflow_dispatch:
    inputs:
      allocation_snapshot_mode:
        description: Check committed allocation snapshots or generate artifacts without committing them
        required: true
        default: check
        type: choice
        options:
          - check
          - generate

permissions:
  contents: read

concurrency:
  # Keep one run per PR and only the newest main push. Manual snapshot runs stay independent.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.event_name == 'push' && format('ref-{0}', github.ref) || format('run-{0}', github.run_id) }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Host-independent checks once; do not pay for them on every OS matrix cell.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked -p sugar_path --all-features --no-deps

  test:
    name: Test ${{ matrix.expected_host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            expected_host: x86_64-unknown-linux-gnu
            required_target_feature: ""
            expected_tests: |-
              impl_sugar_path::relative_str_tests::production_dispatch_and_suffix_validation_match_short_path_oracle
              impl_sugar_path::normalization_classifier_tests::unix_classifier_matches_full_normalizer_for_short_arbitrary_bytes
              public_normalize_matches_the_bounded_independent_model
              normalization_is_exactly_idempotent
              public_relative_with_matches_the_bounded_independent_model
              unix::absolute_relative_common_prefix_compares_invalid_encoding_exactly
              utf8_string_receivers_borrow_only_from_the_receiver
              unix_path_equality_does_not_define_normalized_spelling
              absolute_paths_do_not_require_current_directory
              cwd_independent_relative_inputs_do_not_read_the_current_directory
              current_directory_is_cached_only_when_requested
              pure_relative_calls_initialize_and_observe_cwd_policy
              failed_cwd_lookup_does_not_poison_later_relative_calls
              non_utf8_ambient_cwd_is_preserved
              requested_cached_current_dir_configuration_is_active
          - os: windows-latest
            expected_host: x86_64-pc-windows-msvc
            required_target_feature: ""
            expected_tests: |-
              windows_relative_with_has_fixed_context_results
              impl_sugar_path::normalization_classifier_tests::windows_classifier_matches_full_normalizer_for_short_arbitrary_wide_units
              public_normalize_matches_the_bounded_independent_model
              normalization_is_exactly_idempotent
              public_relative_with_matches_the_bounded_independent_model
              encoded_root_identifiers_compare_only_ascii_case_and_exact_native_units
              absolutization_preserves_encoded_root_identifiers
              windows::absolute_relative_common_prefix_compares_invalid_encoding_exactly
              utf8_string_receivers_borrow_only_from_the_receiver
              windows_path_equality_does_not_define_normalized_spelling
              windows_prefix_like_normal_components_remain_exactly_idempotent
              current_directory_is_cached_only_when_requested
              pure_relative_calls_initialize_and_observe_cwd_policy
              requested_cached_current_dir_configuration_is_active
          - os: macos-latest
            expected_host: aarch64-apple-darwin
            required_target_feature: neon
            expected_tests: |-
              absolute_relative_paths_cross_neon_block_boundaries_exactly
              impl_sugar_path::normalization_classifier_tests::unix_classifier_matches_full_normalizer_for_short_arbitrary_bytes
              public_normalize_matches_the_bounded_independent_model
              normalization_is_exactly_idempotent
              public_relative_with_matches_the_bounded_independent_model
              unix::absolute_relative_common_prefix_compares_invalid_encoding_exactly
              utf8_string_receivers_borrow_only_from_the_receiver
              unix_path_equality_does_not_define_normalized_spelling
              absolute_paths_do_not_require_current_directory
              cwd_independent_relative_inputs_do_not_read_the_current_directory
              current_directory_is_cached_only_when_requested
              pure_relative_calls_initialize_and_observe_cwd_policy
              failed_cwd_lookup_does_not_poison_later_relative_calls
              requested_cached_current_dir_configuration_is_active
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: clippy
      - name: Verify native Rust target
        env:
          EXPECTED_HOST: ${{ matrix.expected_host }}
          REQUIRED_TARGET_FEATURE: ${{ matrix.required_target_feature }}
        run: |
          actual_host="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ "$actual_host" != "$EXPECTED_HOST" ]]; then
            echo "expected Rust host $EXPECTED_HOST, found $actual_host"
            exit 1
          fi
          if [[ -n "$REQUIRED_TARGET_FEATURE" ]] \
            && ! rustc --print cfg | grep -Fqx "target_feature=\"$REQUIRED_TARGET_FEATURE\""; then
            echo "Rust host $EXPECTED_HOST is missing target feature $REQUIRED_TARGET_FEATURE"
            exit 1
          fi
      - name: Verify native package artifact
        run: |
          cargo package --locked -p sugar_path
          cargo package --locked -p sugar_path --features cached_current_dir
      # Clippy stays on each OS: platform-gated imports only fail under that target.
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test default features
        env:
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR: "0"
        run: cargo test --locked -p sugar_path
      - name: Test cached current directory
        env:
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR: "1"
        run: cargo test --locked --workspace --features cached_current_dir
      - name: Verify platform-specific test registration and execution
        env:
          EXPECTED_TESTS: ${{ matrix.expected_tests }}
        run: |
          cargo test --locked -p sugar_path --lib --tests -- --list > target/default-tests.txt
          cargo test --locked -p sugar_path --features cached_current_dir --lib --tests -- --list > target/cached-tests.txt
          cargo test --locked -p sugar_path --lib --tests -- --ignored --list > target/default-ignored-tests.txt
          cargo test --locked --workspace --features cached_current_dir --lib --bins --tests -- --ignored --list > target/cached-ignored-tests.txt
          cargo test --locked -p sugar_path --doc -- --ignored --list > target/default-ignored-doc-tests.txt
          cargo test --locked --workspace --features cached_current_dir --doc -- --ignored --list > target/cached-ignored-doc-tests.txt
          for registered_tests in target/default-tests.txt target/cached-tests.txt; do
            while IFS= read -r expected_test; do
              if ! grep -Fqx "$expected_test: test" "$registered_tests"; then
                echo "expected platform-specific test was not registered in $registered_tests: $expected_test"
                cat "$registered_tests"
                exit 1
              fi
            done <<< "$EXPECTED_TESTS"
          done
          for ignored_tests in \
            target/default-ignored-tests.txt \
            target/cached-ignored-tests.txt \
            target/default-ignored-doc-tests.txt \
            target/cached-ignored-doc-tests.txt; do
            if grep -Eq ': test$' "$ignored_tests"; then
              echo "registered tests must not be ignored in $ignored_tests"
              cat "$ignored_tests"
              exit 1
            fi
          done

  wasm:
    name: Test WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: clippy
          targets: wasm32-unknown-unknown,wasm32-wasip1
      - name: Check browser WebAssembly library
        run: |
          cargo check --locked -p sugar_path --lib --target wasm32-unknown-unknown --no-default-features
          cargo check --locked -p sugar_path --lib --target wasm32-unknown-unknown --no-default-features --features cached_current_dir
      - name: Verify WebAssembly package artifacts
        run: |
          cargo package --locked -p sugar_path --target wasm32-unknown-unknown --no-default-features
          cargo package --locked -p sugar_path --target wasm32-unknown-unknown --no-default-features --features cached_current_dir
          cargo package --locked -p sugar_path --target wasm32-wasip1 --no-default-features
          cargo package --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir
      - name: Install Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1
        with:
          version: "46.0.1"
      - name: Configure WASI runner
        run: |
          mkdir -p "$RUNNER_TEMP/sugar-path-wasi-a" "$RUNNER_TEMP/sugar-path-wasi-b"
          echo "CARGO_TARGET_WASM32_WASIP1_RUNNER=wasmtime --dir=$RUNNER_TEMP/sugar-path-wasi-a::/sugar-path-wasi-a --dir=$RUNNER_TEMP/sugar-path-wasi-b::/sugar-path-wasi-b --env SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR" >> "$GITHUB_ENV"
      - name: Clippy WASI tests
        run: |
          cargo clippy --locked -p sugar_path --target wasm32-wasip1 --no-default-features --test 'wasm_wasi_*' --test feature_configuration -- -D warnings
          cargo clippy --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --test 'wasm_wasi_*' --test feature_configuration -- -D warnings
      - name: Test WASI default features
        env:
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR: "0"
        run: cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --test 'wasm_wasi_*' --test feature_configuration
      - name: Test WASI cached current directory
        env:
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR: "1"
        run: cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --test 'wasm_wasi_*' --test feature_configuration
      - name: Test WASI documentation
        env:
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR: "1"
        run: cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --doc
      - name: Verify WASI test registration and execution
        run: |
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR=0 cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --test 'wasm_wasi_*' --test feature_configuration -- --list > target/wasi-default-tests.txt
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR=1 cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --test 'wasm_wasi_*' --test feature_configuration -- --list > target/wasi-cached-tests.txt
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR=0 cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --test 'wasm_wasi_*' --test feature_configuration -- --ignored --list > target/wasi-default-ignored-tests.txt
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR=1 cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --test 'wasm_wasi_*' --test feature_configuration -- --ignored --list > target/wasi-cached-ignored-tests.txt
          SUGAR_PATH_EXPECT_CACHED_CURRENT_DIR=1 cargo test --locked -p sugar_path --target wasm32-wasip1 --no-default-features --features cached_current_dir --doc -- --ignored --list > target/wasi-cached-ignored-doc-tests.txt
          for registered_tests in target/wasi-default-tests.txt target/wasi-cached-tests.txt; do
            for expected_test in \
              normalize_preserves_wasi_spelling_and_native_encoding \
              absolutize_uses_explicit_context_without_host_filesystem_access \
              relative_apis_cover_ambient_independent_and_explicit_contexts \
              slash_policies_cover_valid_and_invalid_wasi_encoding \
              consuming_and_string_apis_preserve_wasi_results \
              ambient_cwd_observes_the_requested_feature_policy \
              requested_cached_current_dir_configuration_is_active; do
              if ! grep -Fqx "$expected_test: test" "$registered_tests"; then
                echo "expected WASI test was not registered in $registered_tests: $expected_test"
                cat "$registered_tests"
                exit 1
              fi
            done
          done
          for ignored_tests in \
            target/wasi-default-ignored-tests.txt \
            target/wasi-cached-ignored-tests.txt \
            target/wasi-cached-ignored-doc-tests.txt; do
            if grep -Eq ': test$' "$ignored_tests"; then
              echo "registered WASI tests must not be ignored in $ignored_tests"
              cat "$ignored_tests"
              exit 1
            fi
          done

  # Continuous gate: Linux + Windows only. The tracker always measures the
  # cached_current_dir production config via `cargo allocs`.
  allocations:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.allocation_snapshot_mode == 'generate' && 'Generate allocation snapshot' || 'Allocation snapshot' }} ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            snapshot: x86_64-unknown-linux-gnu.snap
          - os: windows-latest
            snapshot: x86_64-pc-windows-msvc.snap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - name: Check committed allocation snapshot
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.allocation_snapshot_mode != 'generate' }}
        run: cargo allocs --check benchmarks/allocations/${{ matrix.snapshot }}
      - name: Generate allocation snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.allocation_snapshot_mode == 'generate' }}
        run: |
          mkdir -p benchmarks/allocations
          cargo allocs --write benchmarks/allocations/${{ matrix.snapshot }}
      - name: Upload generated allocation snapshot
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.allocation_snapshot_mode == 'generate' }}
        uses: actions/upload-artifact@v4
        with:
          name: allocation-snapshot-${{ matrix.snapshot }}
          path: benchmarks/allocations/${{ matrix.snapshot }}
          if-no-files-found: error
