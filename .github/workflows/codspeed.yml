name: CodSpeed

on:
  pull_request:
    paths:
      - .github/workflows/codspeed.yml
      - .cargo/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - build.rs
      - src/**
      - benches/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/codspeed.yml
      - .cargo/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - build.rs
      - src/**
      - benches/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.event_name == 'push' && format('ref-{0}', github.ref) || format('run-{0}', github.run_id) }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark (simulation, memory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed@5.0.1
      - name: Build benchmarks
        env:
          RUSTFLAGS: "-C debuginfo=1 -C strip=none"
        run: cargo codspeed build --locked --profile bench -m simulation,memory --features codspeed,cached_current_dir
      - name: Run benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        timeout-minutes: 15
        with:
          mode: simulation,memory
          run: cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
