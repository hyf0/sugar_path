name: CodSpeed

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark (${{ matrix.mode }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        mode: [simulation, memory]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed@5.0.1
      - name: Build benchmarks
        env:
          RUSTFLAGS: "-C debuginfo=1 -C strip=none"
        run: cargo codspeed build --locked --profile bench -m ${{ matrix.mode }} --features codspeed,cached_current_dir
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        timeout-minutes: 15
        with:
          mode: ${{ matrix.mode }}
          run: cargo codspeed run -m ${{ matrix.mode }}
          token: ${{ secrets.CODSPEED_TOKEN }}
